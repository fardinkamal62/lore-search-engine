{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login - Lore</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="{% static 'styles/login.css' %}?v={{ timestamp }}">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.slim.js"
            integrity="sha512-docBEeq28CCaXCXN7cINkyQs0pRszdQsVBFWUd+pLNlEk3LDlSDDtN7i1H+nTB8tshJPQHS0yu0GW9YGFd/CRg=="
            crossorigin="anonymous" referrerpolicy="no-referrer"></script>
</head>

<body>
{% csrf_token %}
<div class="container d-flex flex-column justify-content-center align-items-center min-vh-100">
    <div class="login-card">
        <div class="text-center mb-4">
            <h1 class="login-logo">Lore</h1>
            <p class="text-muted mb-0">Your Personal Search Engine</p>
        </div>

        <div id="error-alert" class="alert alert-danger d-none" role="alert"></div>

        <form id="login-form" novalidate>
            <div class="mb-3">
                <label for="username" class="form-label">Username</label>
                <input type="text" class="form-control" id="username" placeholder="Enter username"
                       autocomplete="username" autofocus required>
            </div>
            <div class="mb-4">
                <label for="password" class="form-label">Password</label>
                <input type="password" class="form-control" id="password" placeholder="Enter password"
                       autocomplete="current-password" required>
            </div>
            <button type="submit" class="btn btn-primary w-100" id="login-btn">
                <span id="btn-text">Sign in</span>
                <span id="btn-spinner" class="spinner-border spinner-border-sm d-none ms-2" role="status"></span>
            </button>
        </form>

        <p class="text-center text-muted mt-4 mb-0 small">
            Don't have an account? <span class="text-secondary">Contact admin.</span>
        </p>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
<script src="{% static 'scripts/login.js' %}?v={{ timestamp }}"></script>
</body>
</html>
