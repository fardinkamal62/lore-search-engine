{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Files - Lore</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
          integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
          crossorigin="anonymous" referrerpolicy="no-referrer"/>
    <link rel="stylesheet" href="{% static 'styles/profile.css' %}?v={{ timestamp }}">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.slim.js"
            integrity="sha512-docBEeq28CCaXCXN7cINkyQs0pRszdQsVBFWUd+pLNlEk3LDlSDDtN7i1H+nTB8tshJPQHS0yu0GW9YGFd/CRg=="
            crossorigin="anonymous" referrerpolicy="no-referrer"></script>
</head>

<body>
{% csrf_token %}

<!-- Top nav -->
<nav class="navbar navbar-light bg-white border-bottom px-4 py-2 d-flex justify-content-between align-items-center">
    <a class="navbar-brand fw-bold mb-0" href="/">Lore</a>
    <div class="d-flex align-items-center gap-3">
        <a href="/" class="text-decoration-none text-muted small">
            <i class="fa-solid fa-magnifying-glass me-1"></i>Search
        </a>
        <span id="nav-username" class="text-muted small"></span>
        <button id="logout-btn" class="btn btn-sm btn-outline-secondary">Sign out</button>
    </div>
</nav>

<!-- Page content -->
<div class="container py-4" style="max-width: 860px;">

    <!-- Header row -->
    <div class="d-flex align-items-center justify-content-between mb-4">
        <div>
            <h4 class="mb-0">My Files</h4>
            <small class="text-muted" id="stats-label">Loading…</small>
        </div>
        <button class="btn btn-primary btn-sm" id="open-upload-btn">
            <i class="fa-solid fa-cloud-arrow-up me-1"></i>Upload Files
        </button>
    </div>

    <!-- Upload panel (hidden by default) -->
    <div id="upload-panel" class="mb-4 d-none">
        <div id="drop-zone"
             class="drop-zone text-center p-4 rounded border border-2 text-muted"
             role="button" tabindex="0" aria-label="Upload files">
            <i class="fa-solid fa-cloud-arrow-up fa-2x mb-2"></i>
            <div>
                Drag &amp; drop files here or
                <button type="button" id="browse-trigger" class="btn btn-link p-0 align-baseline text-primary">browse</button>
            </div>
            <small>PDF, DOCX, PNG, JPG, MD &mdash; up to 20 MB each</small>
            <input type="file" id="file-input" multiple accept=".pdf,.docx,.png,.jpg,.jpeg,.md" class="d-none">
        </div>
        <div id="upload-list" class="mt-2"></div>
    </div>

    <!-- File list -->
    <div id="file-list">
        <div class="text-center py-5 text-muted">
            <div class="spinner-border spinner-border-sm" role="status"></div>
            <span class="ms-2">Loading your files…</span>
        </div>
    </div>
</div>

<!-- Rename modal -->
<div class="modal fade" id="rename-modal" tabindex="-1" aria-labelledby="rename-modal-label" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="rename-modal-label">Rename File</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="rename-file-id">
                <label for="rename-input" class="form-label">New name</label>
                <input type="text" class="form-control" id="rename-input" placeholder="filename.pdf">
                <div id="rename-error" class="text-danger small mt-1 d-none"></div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button type="button" class="btn btn-primary" id="rename-save-btn">Save</button>
            </div>
        </div>
    </div>
</div>

<!-- Delete confirm modal -->
<div class="modal fade" id="delete-modal" tabindex="-1" aria-labelledby="delete-modal-label" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="delete-modal-label">Delete File</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <p>Are you sure you want to delete <strong id="delete-file-name"></strong>?</p>
                <p class="text-muted small mb-0">This will also remove it from the search index.</p>
                <input type="hidden" id="delete-file-id">
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button type="button" class="btn btn-danger" id="delete-confirm-btn">Delete</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
<script src="{% static 'scripts/profile.js' %}?v={{ timestamp }}"></script>
</body>
</html>
